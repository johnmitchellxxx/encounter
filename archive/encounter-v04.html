<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>ENCOUNTER v0.4</title>
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { background: #0a0a0a; }
  #root { max-width: 500px; margin: 0 auto; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;


// ==========================================
// GAME DATA
// ==========================================
const WEAPONS = [
  { id: "daggers", name: "Twin Daggers", type: "Close", dice: [4,4], baseSpeeds: [160,120], attacks: 2, special: "2 attacks", disarmable: true },
  { id: "katana", name: "Katana", type: "Melee", dice: [6], baseSpeeds: [120], attacks: 1, special: "+1 Disarm", disarmable: true, disarmBonus: 1 },
  { id: "spear", name: "Spear", type: "Melee & Ranged", dice: [6], baseSpeeds: [120], attacks: 1, special: "+1 Defense", disarmable: true, defBonus: 1 },
  { id: "warhammer", name: "Warhammer", type: "Melee", dice: [8], baseSpeeds: [75], attacks: 1, special: "Ignores BLOCK", disarmable: true, ignoresBlock: true },
  { id: "shotgun", name: "Shotgun", type: "Ranged", dice: [10], baseSpeeds: [55], attacks: 1, special: "Ignores DODGE, reload every 3rd", disarmable: true, reload: true, ignoresDodge: true },
];
const FISTS = { id: "fists", name: "Bare Fists", type: "Close", dice: [3,3], baseSpeeds: [100,130], attacks: 2, special: "—", disarmable: false };
const ATTACK_STYLES = [
  { id: "reckless", name: "RECKLESS", desc: "Attack roll is easier, Defense roll is harder", atkSpeedMod: 40, defSpeedMod: -40 },
  { id: "tactical", name: "TACTICAL", desc: "Rolls are normal", atkSpeedMod: 0, defSpeedMod: 0 },
  { id: "cautious", name: "CAUTIOUS", desc: "Attack roll is harder, Defense roll is easier", atkSpeedMod: -40, defSpeedMod: 40 },
];
const DEFENSE_TYPES = [
  { id: "dodge", name: "DODGE", line1: "On success, take zero damage", line2: "Defense roll is harder" },
  { id: "block", name: "BLOCK", line1: "Subtract your roll from their damage", line2: "Defense roll is normal" },
  { id: "disarm", name: "DISARM", line1: "On success, strip their weapon", line2: "On fail, you take full damage" },
];
const START_HP = 12;
const BASE_DEF_SPEED = 120;
const DODGE_SPEED_PENALTY = -30;
const INIT_SPEED = 100;
const FONT = "-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif";

function getAtkSpeeds(weapon, styleId) {
  const style = ATTACK_STYLES.find(s => s.id === styleId);
  return weapon.baseSpeeds.map(s => Math.max(40, s + (style ? style.atkSpeedMod : 0)));
}
function getDefSpeed(styleId, defenseId) {
  const style = ATTACK_STYLES.find(s => s.id === styleId);
  let speed = BASE_DEF_SPEED + (style ? style.defSpeedMod : 0);
  if (defenseId === "dodge") speed += DODGE_SPEED_PENALTY;
  return Math.max(40, speed);
}
function isReloading(player) { return player.weapon.reload && player.shotsFired >= 2; }
function freshPlayer(name, weapon) {
  return { name, hp: START_HP, weapon: {...weapon}, originalWeapon: {...weapon}, style: null, defense: null, atkRolls: [], defRoll: null, shotsFired: 0, initRoll: null };
}

// ==========================================
// APP
// ==========================================
function App() {
  const [phase, setPhase] = useState("menu");
  // menu, pick-p1, pick-p2, choose-p1, choose-p2,
  // init-p1, init-p2, init-result,
  // atk-first, def-second, atk-second, def-first, resolve, result, done
  const [p1, setP1] = useState(null);
  const [p2, setP2] = useState(null);
  const [round, setRound] = useState(0);
  const [log, setLog] = useState([]);
  const [firstPlayer, setFirstPlayer] = useState(null); // "p1" or "p2"
  const [lastResult, setLastResult] = useState(null);

  // Dice
  const [diceVals, setDiceVals] = useState([1,1]);
  const [diceRunning, setDiceRunning] = useState(false);
  const [diceStopped, setDiceStopped] = useState(false);
  const [stoppedVals, setStoppedVals] = useState([]);
  const [singleVal, setSingleVal] = useState(1);
  const [singleRunning, setSingleRunning] = useState(false);
  const [singleStopped, setSingleStopped] = useState(false);
  const [stoppedSingle, setStoppedSingle] = useState(null);
  const diceRefs = useRef([]);
  const singleRef = useRef(null);
  const diceRunningRef = useRef(false);
  const singleRunningRef = useRef(false);
  const diceValsRef = useRef([1,1]);
  const singleValRef = useRef(1);
  const logRef = useRef(null);

  const addLog = useCallback((msg, cls) => {
    setLog(prev => [...prev.slice(-50), { msg, cls }]);
  }, []);

  useEffect(() => {
    if (logRef.current) logRef.current.scrollTop = logRef.current.scrollHeight;
  }, [log]);

  useEffect(() => () => {
    diceRefs.current.forEach(r => r && clearInterval(r));
    if (singleRef.current) clearInterval(singleRef.current);
  }, []);

  // ==========================================
  // MULTI-DICE (attack)
  // ==========================================
  const startMultiDice = (speeds, maxVals) => {
    setDiceStopped(false); setStoppedVals([]);
    diceRunningRef.current = true; setDiceRunning(true);
    const vals = maxVals.map(() => 1);
    diceValsRef.current = [...vals]; setDiceVals([...vals]);
    const refs = [];
    maxVals.forEach((mx, i) => {
      let v = 1;
      refs.push(setInterval(() => {
        v = (v % mx) + 1; vals[i] = v;
        diceValsRef.current = [...vals]; setDiceVals([...vals]);
      }, speeds[i]));
    });
    diceRefs.current = refs;
  };

  const stopMultiDice = () => {
    if (!diceRunningRef.current) return null;
    diceRunningRef.current = false;
    diceRefs.current.forEach(r => clearInterval(r)); diceRefs.current = [];
    setDiceRunning(false);
    const rolls = [...diceValsRef.current];
    setStoppedVals(rolls); setDiceStopped(true);
    return rolls;
  };

  // ==========================================
  // SINGLE DIE (defense, initiative)
  // ==========================================
  const startSingleDie = (speed, maxVal = 6) => {
    setSingleStopped(false); setStoppedSingle(null);
    singleRunningRef.current = true; setSingleRunning(true);
    let v = 1; singleValRef.current = 1; setSingleVal(1);
    singleRef.current = setInterval(() => {
      v = (v % maxVal) + 1; singleValRef.current = v; setSingleVal(v);
    }, speed);
  };

  const stopSingleDie = () => {
    if (!singleRunningRef.current) return null;
    singleRunningRef.current = false;
    clearInterval(singleRef.current); singleRef.current = null;
    setSingleRunning(false);
    const val = singleValRef.current;
    setStoppedSingle(val); setSingleStopped(true);
    return val;
  };

  const clearDiceDisplay = () => {
    setDiceStopped(false); setStoppedVals([]);
    setSingleStopped(false); setStoppedSingle(null);
  };

  // ==========================================
  // GAME FLOW
  // ==========================================
  const startGame = () => {
    setP1(null); setP2(null); setRound(0); setLastResult(null); setFirstPlayer(null);
    setLog([{ msg: "ENCOUNTER v0.4", cls: "sys" }]);
    setPhase("pick-p1");
  };

  const pickWeapon = (slot, weapon) => {
    const p = freshPlayer(slot === "p1" ? "P1" : "P2", weapon);
    if (slot === "p1") { setP1(p); addLog(`P1 chose ${weapon.name}`, "p1"); setPhase("pick-p2"); }
    else { setP2(p); addLog(`P2 chose ${weapon.name}`, "p2"); setRound(1); addLog("— Round 1 —", "sys"); setPhase("choose-p1"); }
  };

  const pickStyle = (slot, styleId) => {
    (slot === "p1" ? setP1 : setP2)(prev => ({ ...prev, style: styleId }));
  };

  const pickDefense = (slot, defId) => {
    (slot === "p1" ? setP1 : setP2)(prev => ({ ...prev, defense: defId }));
  };

  const lockP1 = () => {
    if (!p1.style || !p1.defense) return;
    addLog(`P1 locked in`, "p1");
    setPhase("choose-p2");
  };

  const lockP2 = () => {
    if (!p2.style || !p2.defense) return;
    addLog(`P2 locked in`, "p2");
    setPhase("init-p1");
  };

  // INITIATIVE
  const handleInitP1 = () => {
    startSingleDie(INIT_SPEED);
  };
  const stopInitP1 = () => {
    const val = stopSingleDie();
    if (val === null) return;
    setP1(prev => ({ ...prev, initRoll: val }));
    addLog(`P1 initiative: ${val}`, "p1");
    setTimeout(() => { clearDiceDisplay(); setPhase("init-p2"); }, 2000);
  };
  const handleInitP2 = () => {
    startSingleDie(INIT_SPEED);
  };
  const stopInitP2 = () => {
    const val = stopSingleDie();
    if (val === null) return;
    setP2(prev => ({ ...prev, initRoll: val }));
    addLog(`P2 initiative: ${val}`, "p2");
    setTimeout(() => {
      clearDiceDisplay();
      // Determine who goes first
      const p1Init = p1.initRoll;
      const p2Init = val;
      let first;
      if (p1Init > p2Init) { first = "p1"; addLog("P1 goes first!", "win"); }
      else if (p2Init > p1Init) { first = "p2"; addLog("P2 goes first!", "win"); }
      else { first = Math.random() < 0.5 ? "p1" : "p2"; addLog(`Tie! ${first.toUpperCase()} wins coin flip`, "win"); }
      setFirstPlayer(first);
      setPhase("init-result");
    }, 2000);
  };

  // After init result, move to first player's attack
  const startCombat = () => {
    const first = firstPlayer;
    const fp = first === "p1" ? p1 : p2;
    if (isReloading(fp)) {
      (first === "p1" ? setP1 : setP2)(prev => ({ ...prev, atkRolls: [0], shotsFired: 0 }));
      addLog(`${fp.name} is RELOADING`, first);
      setTimeout(() => setPhase(`def-${first === "p1" ? "p2" : "p1"}`), 1500);
      // Actually if first player reloads, skip to second player's attack
      setTimeout(() => {
        const second = first === "p1" ? "p2" : "p1";
        setPhase(`atk-${second}`);
      }, 1500);
      return;
    }
    setPhase(`atk-${first}`);
  };

  // ATTACK
  const handleStartAtk = (slot) => {
    const p = slot === "p1" ? p1 : p2;
    const speeds = getAtkSpeeds(p.weapon, p.style);
    startMultiDice(speeds, p.weapon.dice);
  };

  const handleStopAtk = (slot) => {
    const rolls = stopMultiDice();
    if (!rolls) return;
    const p = slot === "p1" ? p1 : p2;
    const setP = slot === "p1" ? setP1 : setP2;
    const finalRolls = rolls.slice(0, p.weapon.dice.length);
    if (p.weapon.reload) {
      setP(prev => ({ ...prev, atkRolls: finalRolls, shotsFired: prev.shotsFired + 1 }));
    } else {
      setP(prev => ({ ...prev, atkRolls: finalRolls }));
    }
    const total = finalRolls.reduce((a,b) => a+b, 0);
    addLog(`${p.name} attack: ${finalRolls.length > 1 ? finalRolls.join("+") + "=" : ""}${total}`, slot);
    setTimeout(() => {
      clearDiceDisplay();
      // Now the OTHER player defends
      const other = slot === "p1" ? "p2" : "p1";
      setPhase(`def-${other}`);
    }, 2000);
  };

  // DEFENSE
  const handleStartDef = (slot) => {
    const p = slot === "p1" ? p1 : p2;
    const speed = getDefSpeed(p.style, p.defense);
    startSingleDie(speed);
  };

  const handleStopDef = (slot) => {
    const val = stopSingleDie();
    if (val === null) return;
    const p = slot === "p1" ? p1 : p2;
    (slot === "p1" ? setP1 : setP2)(prev => ({ ...prev, defRoll: val }));
    addLog(`${p.name} defense: ${val}`, slot);
    setTimeout(() => {
      clearDiceDisplay();
      // Resolve first exchange
      const attacker = slot === "p1" ? "p2" : "p1"; // the one who attacked
      resolveExchange(attacker, slot);
    }, 2000);
  };

  // RESOLVE ONE EXCHANGE
  const resolveExchange = (atkSlot, defSlot) => {
    const atk = atkSlot === "p1" ? p1 : p2;
    const def = defSlot === "p1" ? p1 : p2;
    const setAtk = atkSlot === "p1" ? setP1 : setP2;
    const setDef = defSlot === "p1" ? setP1 : setP2;
    const atkW = atk.weapon;
    const defW = def.weapon;

    const atkTotal = atk.atkRolls.reduce((a,b) => a+b, 0);
    const defTotal = def.defRoll + (defW.defBonus || 0);
    const atkReloading = atk.atkRolls[0] === 0 && atk.atkRolls.length === 1;

    let dmg = 0;

    if (atkReloading) {
      addLog(`${atk.name} reloaded — no damage`, atkSlot);
    } else {
      if (def.defense === "dodge") {
        if (atkW.ignoresDodge) { dmg = atkTotal; addLog(`Shotgun ignores DODGE — ${dmg} damage!`, "dmg"); }
        else if (defTotal >= atkTotal) { addLog(`${def.name} DODGED! (${defTotal} vs ${atkTotal})`, defSlot); }
        else { dmg = atkTotal; addLog(`${def.name} failed dodge — ${dmg} damage!`, "dmg"); }
      } else if (def.defense === "block") {
        if (atkW.ignoresBlock) { dmg = atkTotal; addLog(`Ignores BLOCK — ${dmg} damage!`, "dmg"); }
        else { dmg = Math.max(0, atkTotal - defTotal); addLog(`${def.name} blocked ${defTotal} — takes ${dmg}`, defSlot); }
      } else if (def.defense === "disarm") {
        const db = defW.disarmBonus || 0;
        if ((defTotal + db) >= atkTotal && atkW.disarmable) {
          addLog(`${def.name} DISARMED ${atk.name}'s ${atkW.name}!`, "win");
          setAtk(prev => ({ ...prev, weapon: {...FISTS} }));
        } else {
          dmg = atkTotal;
          addLog(`Disarm failed — ${dmg} damage!`, "dmg");
        }
      } else if (def.defense === "recover") {
        if (defTotal >= atkTotal) {
          addLog(`${def.name} RECOVERED their ${def.originalWeapon.name}!`, "win");
          setDef(prev => ({ ...prev, weapon: {...prev.originalWeapon}, shotsFired: prev.shotsFired }));
        } else {
          dmg = atkTotal;
          addLog(`Recovery failed — ${dmg} damage!`, "dmg");
        }
      }
    }

    // Apply damage
    if (dmg > 0) {
      setDef(prev => ({ ...prev, hp: Math.max(0, prev.hp - dmg) }));
    }

    // Check if defender died
    const newDefHp = def.hp - dmg;
    if (newDefHp <= 0) {
      addLog(`${def.name} is DOWN!`, "win");
      // Check if this was the first or second exchange
      if (atkSlot === firstPlayer) {
        // First player killed second — fight over
        setTimeout(() => setPhase("resolve"), 500);
      } else {
        // Second player killed first — but first already attacked, so resolve
        setTimeout(() => setPhase("resolve"), 500);
      }
    } else {
      // Defender survived
      if (atkSlot === firstPlayer) {
        // First exchange done, now second player attacks back
        const second = firstPlayer === "p1" ? "p2" : "p1";
        const sp = second === "p1" ? p1 : p2;
        if (isReloading(sp)) {
          (second === "p1" ? setP1 : setP2)(prev => ({ ...prev, atkRolls: [0], shotsFired: 0 }));
          addLog(`${sp.name} is RELOADING`, second);
          setTimeout(() => setPhase("resolve"), 1500);
        } else {
          setTimeout(() => setPhase(`atk-${second}`), 500);
        }
      } else {
        // Second exchange done — resolve round
        setTimeout(() => setPhase("resolve"), 500);
      }
    }
  };

  // RESOLVE ROUND
  useEffect(() => {
    if (phase !== "resolve") return;
    if (!p1 || !p2) return;

    if (p1.hp <= 0 && p2.hp <= 0) addLog("DOUBLE KO!", "win");
    else if (p1.hp <= 0) addLog("P2 WINS THE FIGHT!", "win");
    else if (p2.hp <= 0) addLog("P1 WINS THE FIGHT!", "win");

    if (p1.hp <= 0 || p2.hp <= 0) {
      setPhase("done");
    } else {
      setPhase("result");
    }
  }, [phase]);

  const nextRound = () => {
    const r = round + 1;
    setRound(r);
    setP1(prev => ({ ...prev, style: null, defense: null, atkRolls: [], defRoll: null, initRoll: null }));
    setP2(prev => ({ ...prev, style: null, defense: null, atkRolls: [], defRoll: null, initRoll: null }));
    setLastResult(null); setFirstPlayer(null);
    addLog(`— Round ${r} —`, "sys");
    setPhase("choose-p1");
  };

  // ==========================================
  // COMPONENTS
  // ==========================================
  const logColors = { sys: "#ddd", p1: "#6bb5ff", p2: "#ff8888", win: "#f0c845", dmg: "#ff6666" };

  const Log = () => (
    <div ref={logRef} style={S.log}>
      {log.slice(-30).map((l, i) => (
        <div key={i} style={{ color: logColors[l.cls] || "#ccc" }}>{l.msg}</div>
      ))}
    </div>
  );

  const HPBar = ({ current, max, color }) => (
    <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
      <div style={{ fontSize: 20, fontWeight: 700, color: "#fff", minWidth: 60 }}>{current}/{max}</div>
      <div style={{ flex: 1, height: 14, background: "#333", borderRadius: 3, overflow: "hidden" }}>
        <div style={{ width: (current/max*100)+"%", height: "100%", background: current <= 3 ? "#ff4a4a" : color, transition: "width 0.3s" }} />
      </div>
    </div>
  );

  const PlayerStatus = ({ player, slot, highlight }) => {
    if (!player) return null;
    const color = slot === "p1" ? "#4a9eff" : "#ff6b6b";
    const reloading = isReloading(player);
    return (
      <div style={{ flex: 1, border: highlight ? `2px solid ${color}` : "1px solid #444", padding: 12, background: "#111", borderRadius: 6 }}>
        <div style={{ fontWeight: 700, fontSize: 18, color: "#fff", marginBottom: 4 }}>{player.name}</div>
        <HPBar current={player.hp} max={START_HP} color={color} />
        <div style={{ fontSize: 18, color: "#fff", fontWeight: 700 }}>⚔ {player.weapon.name}</div>
        <div style={{ fontSize: 14, color: "#ddd", marginTop: 2 }}>{player.weapon.type} • {player.weapon.dice.map(d=>`d${d}`).join("+")}</div>
        <div style={{ fontSize: 14, color: "#6eff9a", marginTop: 2 }}>{player.weapon.special}</div>
        {reloading && <div style={{ fontSize: 14, color: "#f0c845", fontWeight: 700, marginTop: 4 }}>⟳ MUST RELOAD</div>}
      </div>
    );
  };

  const Players = ({ highlightSlot }) => (
    <div style={S.players}>
      <PlayerStatus player={p1} slot="p1" highlight={highlightSlot === "p1"} />
      <PlayerStatus player={p2} slot="p2" highlight={highlightSlot === "p2"} />
    </div>
  );

  // MULTI DICE DISPLAY
  const MultiDiceDisplay = ({ maxVals, vals, running, stopped, stoppedV, label, onStart, onStop }) => (
    <div style={S.diceArea}>
      <div style={{ fontSize: 18, color: "#fff", fontWeight: 700, marginBottom: 10 }}>{label}</div>
      <div style={{ display: "flex", justifyContent: "center", gap: 20 }}>
        {maxVals.map((mx, i) => (
          <div key={i} style={{ textAlign: "center" }}>
            <div style={{ fontSize: 14, color: "#ccc", marginBottom: 4 }}>d{mx}</div>
            <div style={{
              fontSize: 64, fontWeight: 800, width: 90, height: 80, lineHeight: "80px",
              color: stopped ? "#e8b031" : running ? "#888" : "#555",
              border: stopped ? "2px solid #e8b031" : "1px solid #444", background: "#0a0a0a", borderRadius: 6,
              fontFamily: "'Courier New', monospace",
            }}>{stopped ? (stoppedV[i] || "—") : running ? vals[i] : "—"}</div>
          </div>
        ))}
      </div>
      {stopped ? (
        <div style={{ fontSize: 24, color: "#e8b031", fontWeight: 700, marginTop: 14 }}>
          {stoppedV.length > 1 ? stoppedV.join(" + ") + " = " + stoppedV.reduce((a,b)=>a+b,0) : stoppedV[0]}
        </div>
      ) : !running ? (
        <button style={S.tapBtn} onPointerDown={e=>{e.preventDefault();onStart()}}>START</button>
      ) : (
        <button style={{...S.tapBtn, background:"#ff6b6b"}} onPointerDown={e=>{e.preventDefault();onStop()}}>TAP!</button>
      )}
    </div>
  );

  // SINGLE DIE DISPLAY
  const SingleDiceDisplay = ({ val, running, stopped, stoppedV, label, color, onStart, onStop }) => (
    <div style={S.diceArea}>
      <div style={{ fontSize: 18, color: "#fff", fontWeight: 700, marginBottom: 10 }}>{label}</div>
      <div style={{ display: "flex", justifyContent: "center" }}>
        <div style={{ textAlign: "center" }}>
          <div style={{ fontSize: 14, color: "#ccc", marginBottom: 4 }}>d6</div>
          <div style={{
            fontSize: 64, fontWeight: 800, width: 90, height: 80, lineHeight: "80px",
            color: stopped ? (color || "#e8b031") : running ? "#888" : "#555",
            border: stopped ? `2px solid ${color || "#e8b031"}` : "1px solid #444", background: "#0a0a0a", borderRadius: 6,
            fontFamily: "'Courier New', monospace",
          }}>{stopped ? stoppedV : running ? val : "—"}</div>
        </div>
      </div>
      {stopped ? (
        <div style={{ fontSize: 24, color: color || "#e8b031", fontWeight: 700, marginTop: 14 }}>{stoppedV}</div>
      ) : !running ? (
        <button style={S.tapBtn} onPointerDown={e=>{e.preventDefault();onStart()}}>START</button>
      ) : (
        <button style={{...S.tapBtn, background: color || "#e8b031", color: "#0a0a0a"}} onPointerDown={e=>{e.preventDefault();onStop()}}>TAP!</button>
      )}
    </div>
  );

  // CHOICE SCREEN
  const ChoiceScreen = ({ player, slot, onPickStyle, onPickDefense, onLock }) => {
    const isFists = player.weapon.id === "fists";
    return (
      <div>
        <div style={{ fontSize: 18, color: "#e8b031", letterSpacing: 2, marginBottom: 8 }}>ATTACK STYLE</div>
        <div style={{ display: "flex", gap: 6, marginBottom: 14 }}>
          {ATTACK_STYLES.map(s => {
            const lines = s.desc.split(", ");
            return (
              <button key={s.id} onClick={() => onPickStyle(s.id)} style={{
                flex: 1, padding: "14px 6px", fontFamily: FONT, fontSize: 16, fontWeight: 700, cursor: "pointer",
                border: player.style === s.id ? "2px solid #e8b031" : "1px solid #444",
                background: player.style === s.id ? "#1a1800" : "#151515",
                color: player.style === s.id ? "#e8b031" : "#fff", textAlign: "center", borderRadius: 6,
              }}>
                <div>{s.name}</div>
                {lines.map((line, i) => (
                  <div key={i} style={{ fontSize: 12, fontWeight: 400, color: i === 0 ? "#ccc" : "#999", marginTop: i === 0 ? 4 : 2 }}>{line}</div>
                ))}
              </button>
            );
          })}
        </div>
        <div style={{ fontSize: 18, color: "#4aff7a", letterSpacing: 2, marginBottom: 8 }}>DEFENSE</div>
        <div style={{ display: "flex", gap: 6, marginBottom: 14 }}>
          {DEFENSE_TYPES.map(d => {
            const showRecover = isFists && d.id === "disarm";
            const label = showRecover ? "RECOVER" : d.name;
            const l1 = showRecover ? "On success, get your weapon back" : d.line1;
            const l2 = showRecover ? "On fail, you take full damage" : d.line2;
            const defId = showRecover ? "recover" : d.id;
            return (
              <button key={d.id} onClick={() => onPickDefense(defId)} style={{
                flex: 1, padding: "14px 6px", fontFamily: FONT, fontSize: 16, fontWeight: 700, cursor: "pointer",
                border: player.defense === defId ? "2px solid #4aff7a" : "1px solid #444",
                background: player.defense === defId ? "#0a1a0a" : "#151515",
                color: player.defense === defId ? "#4aff7a" : "#fff", textAlign: "center", borderRadius: 6,
              }}>
                <div>{label}</div>
                <div style={{ fontSize: 12, fontWeight: 400, color: "#ccc", marginTop: 4 }}>{l1}</div>
                <div style={{ fontSize: 12, fontWeight: 400, color: "#999", marginTop: 2 }}>{l2}</div>
              </button>
            );
          })}
        </div>
        {player.style && player.defense && (
          <button style={S.bigBtn} onClick={onLock}>LOCK IN</button>
        )}
      </div>
    );
  };

  // ==========================================
  // SCREENS
  // ==========================================
  if (phase === "menu") {
    return (
      <div style={S.container}>
        <h1 style={S.title}>ENCOUNTER</h1>
        <div style={S.ver}>v0.4</div>
        <div style={{ padding: "40px 0", textAlign: "center" }}>
          <button style={S.bigBtn} onClick={startGame}>FIGHT</button>
        </div>
      </div>
    );
  }

  // WEAPON PICKS
  if (phase === "pick-p1" || phase === "pick-p2") {
    const slot = phase === "pick-p1" ? "p1" : "p2";
    const color = slot === "p1" ? "#4a9eff" : "#ff6b6b";
    return (
      <div style={S.container}>
        <h1 style={S.title}>ENCOUNTER</h1>
        <div style={{...S.phase, color}}>{slot.toUpperCase()}: CHOOSE WEAPON</div>
        <div style={{ display: "flex", flexDirection: "column", gap: 8, marginTop: 12 }}>
          {WEAPONS.map(w => (
            <button key={w.id} onClick={() => pickWeapon(slot, w)} style={{
              padding: 16, background: "#111", border: "1px solid #444", fontFamily: FONT, cursor: "pointer",
              textAlign: "left", borderRadius: 6, display: "flex", justifyContent: "space-between", alignItems: "center",
            }}>
              <div>
                <div style={{ fontSize: 20, fontWeight: 700, color: "#fff" }}>{w.name}</div>
                <div style={{ fontSize: 14, color: "#ddd", marginTop: 4 }}>{w.type} • {w.dice.map(d=>`d${d}`).join("+")}</div>
              </div>
              <div style={{ fontSize: 14, color: "#6eff9a", textAlign: "right", maxWidth: "45%" }}>{w.special}</div>
            </button>
          ))}
        </div>
        <Log />
      </div>
    );
  }

  // CHOOSE — P1 then P2
  if (phase === "choose-p1") {
    return (
      <div style={S.container}>
        <h1 style={S.title}>ENCOUNTER</h1>
        <div style={S.ver}>Round {round}</div>
        <Players highlightSlot="p1" />
        <div style={{...S.phase, color: "#4a9eff"}}>P1: CHOOSE YOUR STANCE</div>
        <div style={{ fontSize: 14, color: "#999", textAlign: "center", marginBottom: 10 }}>P2 look away!</div>
        <ChoiceScreen player={p1} slot="p1" onPickStyle={id => pickStyle("p1", id)} onPickDefense={id => pickDefense("p1", id)} onLock={lockP1} />
        <Log />
      </div>
    );
  }
  if (phase === "choose-p2") {
    return (
      <div style={S.container}>
        <h1 style={S.title}>ENCOUNTER</h1>
        <div style={S.ver}>Round {round}</div>
        <Players highlightSlot="p2" />
        <div style={{...S.phase, color: "#ff6b6b"}}>P2: CHOOSE YOUR STANCE</div>
        <div style={{ fontSize: 14, color: "#999", textAlign: "center", marginBottom: 10 }}>P1 look away!</div>
        <ChoiceScreen player={p2} slot="p2" onPickStyle={id => pickStyle("p2", id)} onPickDefense={id => pickDefense("p2", id)} onLock={lockP2} />
        <Log />
      </div>
    );
  }

  // INITIATIVE
  if (phase === "init-p1") {
    return (
      <div style={S.container}>
        <h1 style={S.title}>ENCOUNTER</h1>
        <div style={S.ver}>Round {round}</div>
        <Players />
        <div style={S.phase}>INITIATIVE</div>
        <div style={{ fontSize: 16, color: "#ccc", textAlign: "center", marginBottom: 10 }}>P1: Roll for initiative!</div>
        <SingleDiceDisplay val={singleVal} running={singleRunning} stopped={singleStopped} stoppedV={stoppedSingle}
          label="P1 INITIATIVE" color="#4a9eff" onStart={handleInitP1} onStop={stopInitP1} />
        <Log />
      </div>
    );
  }
  if (phase === "init-p2") {
    return (
      <div style={S.container}>
        <h1 style={S.title}>ENCOUNTER</h1>
        <div style={S.ver}>Round {round}</div>
        <Players />
        <div style={S.phase}>INITIATIVE</div>
        <div style={{ fontSize: 16, color: "#ccc", textAlign: "center", marginBottom: 10 }}>P1 rolled: {p1.initRoll} — P2: Roll for initiative!</div>
        <SingleDiceDisplay val={singleVal} running={singleRunning} stopped={singleStopped} stoppedV={stoppedSingle}
          label="P2 INITIATIVE" color="#ff6b6b" onStart={handleInitP2} onStop={stopInitP2} />
        <Log />
      </div>
    );
  }
  if (phase === "init-result") {
    return (
      <div style={S.container}>
        <h1 style={S.title}>ENCOUNTER</h1>
        <div style={S.ver}>Round {round}</div>
        <Players highlightSlot={firstPlayer} />
        <div style={{ textAlign: "center", padding: "20px 0" }}>
          <div style={{ fontSize: 24, color: "#f0c845", fontWeight: 700, marginBottom: 8 }}>
            {firstPlayer.toUpperCase()} GOES FIRST
          </div>
          <div style={{ fontSize: 16, color: "#ccc", marginBottom: 4 }}>P1: {p1.initRoll} vs P2: {p2.initRoll}</div>
          <button style={S.bigBtn} onClick={startCombat}>BEGIN COMBAT</button>
        </div>
        <Log />
      </div>
    );
  }

  // ATTACK PHASES
  if (phase === "atk-p1" || phase === "atk-p2") {
    const slot = phase === "atk-p1" ? "p1" : "p2";
    const p = slot === "p1" ? p1 : p2;
    const color = slot === "p1" ? "#4a9eff" : "#ff6b6b";
    return (
      <div style={S.container}>
        <h1 style={S.title}>ENCOUNTER</h1>
        <div style={S.ver}>Round {round}</div>
        <Players highlightSlot={slot} />
        <MultiDiceDisplay maxVals={p.weapon.dice} vals={diceVals} running={diceRunning} stopped={diceStopped} stoppedV={stoppedVals}
          label={`${p.name}: ATTACK`} onStart={() => handleStartAtk(slot)} onStop={() => handleStopAtk(slot)} />
        <Log />
      </div>
    );
  }

  // DEFENSE PHASES
  if (phase === "def-p1" || phase === "def-p2") {
    const slot = phase === "def-p1" ? "p1" : "p2";
    const p = slot === "p1" ? p1 : p2;
    const color = slot === "p1" ? "#4a9eff" : "#ff6b6b";
    const defLabel = p.defense === "recover" ? "RECOVER" : p.defense?.toUpperCase();
    return (
      <div style={S.container}>
        <h1 style={S.title}>ENCOUNTER</h1>
        <div style={S.ver}>Round {round}</div>
        <Players highlightSlot={slot} />
        <SingleDiceDisplay val={singleVal} running={singleRunning} stopped={singleStopped} stoppedV={stoppedSingle}
          label={`${p.name}: DEFEND (${defLabel})`} color="#4aff7a" onStart={() => handleStartDef(slot)} onStop={() => handleStopDef(slot)} />
        <Log />
      </div>
    );
  }

  // RESULT
  if (phase === "result") {
    return (
      <div style={S.container}>
        <h1 style={S.title}>ENCOUNTER</h1>
        <div style={S.ver}>Round {round}</div>
        <Players />
        <div style={{ textAlign: "center", padding: "24px 0", cursor: "pointer" }} onClick={nextRound}>
          <div style={{ fontSize: 22, color: "#f0c845", fontWeight: 700, marginBottom: 12 }}>ROUND {round} COMPLETE</div>
          <div style={{ fontSize: 18, color: "#fff", marginBottom: 4 }}>P1: {p1.hp}/{START_HP} HP</div>
          <div style={{ fontSize: 18, color: "#fff", marginBottom: 14 }}>P2: {p2.hp}/{START_HP} HP</div>
          <div style={{ fontSize: 16, color: "#ccc" }}>tap to continue</div>
        </div>
        <Log />
      </div>
    );
  }

  // DONE
  if (phase === "done") {
    let winText = "DOUBLE KO!";
    if (p1 && p1.hp > 0) winText = "P1 WINS!";
    if (p2 && p2.hp > 0) winText = "P2 WINS!";
    return (
      <div style={S.container}>
        <h1 style={S.title}>ENCOUNTER</h1>
        <div style={S.ver}>FIGHT OVER</div>
        <div style={{ textAlign: "center", padding: "30px 0" }}>
          <div style={{ fontSize: 32, color: "#f0c845", fontWeight: 700, marginBottom: 16 }}>{winText}</div>
          <div style={{ color: "#ddd", fontSize: 16, marginBottom: 20 }}>Rounds: {round}</div>
          <button style={S.bigBtn} onClick={() => setPhase("menu")}>NEW FIGHT</button>
        </div>
        <Players />
        <Log />
      </div>
    );
  }

  return (<div style={S.container}><div style={S.phase}>...</div><Log /></div>);
}

// ==========================================
// STYLES
// ==========================================
const SFONT = "-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif";
const S = {
  container: { background: "#0a0a0a", color: "#ddd", fontFamily: SFONT, fontSize: 15, minHeight: "100vh", padding: 12 },
  title: { fontSize: 28, color: "#e8b031", letterSpacing: 4, textAlign: "center", margin: 0, fontFamily: "'Courier New', monospace" },
  ver: { color: "#999", fontSize: 14, textAlign: "center", marginBottom: 14 },
  phase: { textAlign: "center", color: "#f0c845", fontSize: 22, fontWeight: 700, letterSpacing: 2, marginBottom: 8 },
  players: { display: "flex", gap: 8, marginBottom: 12 },
  diceArea: { border: "1px solid #444", background: "#111", padding: 24, marginBottom: 12, textAlign: "center", borderRadius: 6 },
  tapBtn: { background: "#e8b031", color: "#0a0a0a", border: "none", padding: "18px 60px", fontFamily: SFONT, fontSize: 22, fontWeight: 700, cursor: "pointer", marginTop: 14, letterSpacing: 2, touchAction: "manipulation", borderRadius: 6 },
  bigBtn: { display: "block", width: "100%", padding: 18, background: "#e8b031", color: "#0a0a0a", border: "none", fontFamily: SFONT, fontSize: 20, fontWeight: 700, cursor: "pointer", letterSpacing: 2, marginBottom: 10, borderRadius: 6 },
  log: { background: "#181818", border: "1px solid #444", padding: 14, fontSize: 15, lineHeight: 1.9, maxHeight: 200, overflowY: "auto", fontFamily: SFONT, borderRadius: 6 },
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
