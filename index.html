const db = firebase.database();

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ==========================================
// GAME DATA
// ==========================================
const WEAPONS = [
  { id: "daggers", name: "Twin Daggers", type: "Close", dice: [4,4], baseSpeeds: [160,120], attacks: 2, special: "2 attacks", disarmable: true },
  { id: "katana", name: "Katana", type: "Melee", dice: [6], baseSpeeds: [120], attacks: 1, special: "+1 Disarm", disarmable: true, disarmBonus: 1 },
  { id: "spear", name: "Spear", type: "Melee & Ranged", dice: [6], baseSpeeds: [120], attacks: 1, special: "+1 Defense", disarmable: true, defBonus: 1 },
  { id: "warhammer", name: "Warhammer", type: "Melee", dice: [8], baseSpeeds: [75], attacks: 1, special: "Ignores BLOCK", disarmable: true, ignoresBlock: true },
  { id: "shotgun", name: "Shotgun", type: "Ranged", dice: [10], baseSpeeds: [55], attacks: 1, special: "Ignores DODGE, reload every 3rd", disarmable: true, reload: true, ignoresDodge: true },
];
const FISTS = { id: "fists", name: "Bare Fists", type: "Close", dice: [3,3], baseSpeeds: [100,130], attacks: 2, special: "—", disarmable: false };
const ATTACK_STYLES = [
  { id: "reckless", name: "RECKLESS", desc: "Attack roll is easier, Defense roll is harder", atkSpeedMod: 40, defSpeedMod: -40 },
  { id: "tactical", name: "TACTICAL", desc: "Rolls are normal", atkSpeedMod: 0, defSpeedMod: 0 },
  { id: "cautious", name: "CAUTIOUS", desc: "Attack roll is harder, Defense roll is easier", atkSpeedMod: -40, defSpeedMod: 40 },
];
const DEFENSE_TYPES = [
  { id: "dodge", name: "DODGE", line1: "On success, take zero damage", line2: "Defense roll is harder" },
  { id: "block", name: "BLOCK", line1: "Subtract your roll from their damage", line2: "Defense roll is normal" },
  { id: "disarm", name: "DISARM", line1: "On success, strip their weapon", line2: "On fail, you take full damage" },
];
const START_HP = 12;
const BASE_DEF_SPEED = 120;
const DODGE_SPEED_PENALTY = -30;
const INIT_SPEED = 100;
const FONT = "-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif";

function getW(id) { if (id==="fists") return {...FISTS}; const w=WEAPONS.find(x=>x.id===id); return w ? {...w} : {...FISTS}; }
function getAtkSpeeds(weapon, styleId) { const s=ATTACK_STYLES.find(x=>x.id===styleId); return weapon.baseSpeeds.map(sp=>Math.max(40,sp+(s?s.atkSpeedMod:0))); }
function getDefSpeed(styleId, defenseId) { const s=ATTACK_STYLES.find(x=>x.id===styleId); let sp=BASE_DEF_SPEED+(s?s.defSpeedMod:0); if(defenseId==="dodge") sp+=DODGE_SPEED_PENALTY; return Math.max(40,sp); }
function isReloading(p) { return p && p.weaponId && getW(p.weaponId).reload && p.shotsFired >= 2; }
function genCode() { const c="ABCDEFGHJKLMNPQRSTUVWXYZ23456789"; let r=""; for(let i=0;i<4;i++) r+=c[Math.floor(Math.random()*c.length)]; return r; }
function freshP(name) { return { name, hp: START_HP, weaponId: null, originalWeaponId: null, style: null, defense: null, atkRolls: [], defRoll: null, shotsFired: 0, initRoll: null, locked: false }; }

// ==========================================
// APP
// ==========================================
function App() {
  const [screen, setScreen] = useState("lobby");
  const [mySlot, setMySlot] = useState(null);
  const [roomCode, setRoomCode] = useState("");
  const [joinInput, setJoinInput] = useState("");
  const [game, setGame] = useState(null);
  const roomRef = useRef(null);

  // RECONNECT on load
  useEffect(() => {
    try {
      const saved = localStorage.getItem("encounter-session");
      if (saved) {
        const { slot, code } = JSON.parse(saved);
        if (slot && code) {
          setMySlot(slot);
          setRoomCode(code);
          setScreen("game");
          // Start listening
          const r = db.ref("rooms/" + code);
          roomRef.current = r;
          r.on("value", s => { const d = s.val(); if (d) setGame(d); else { localStorage.removeItem("encounter-session"); setScreen("lobby"); } });
        }
      }
    } catch(e) {}
  }, []);

  // Dice local
  const [diceVals, setDiceVals] = useState([1,1]);
  const [diceRunning, setDiceRunning] = useState(false);
  const [diceStopped, setDiceStopped] = useState(false);
  const [stoppedVals, setStoppedVals] = useState([]);
  const [singleVal, setSingleVal] = useState(1);
  const [singleRunning, setSingleRunning] = useState(false);
  const [singleStopped, setSingleStopped] = useState(false);
  const [stoppedSingle, setStoppedSingle] = useState(null);
  const diceRefs = useRef([]);
  const singleDiceRef = useRef(null);
  const diceRunningRef = useRef(false);
  const singleRunningRef = useRef(false);
  const diceValsRef = useRef([1,1]);
  const singleValRef = useRef(1);
  const logRef = useRef(null);

  useEffect(() => { if(logRef.current) logRef.current.scrollTop=logRef.current.scrollHeight; }, [game?.log]);
  useEffect(() => () => { diceRefs.current.forEach(r=>r&&clearInterval(r)); if(singleDiceRef.current) clearInterval(singleDiceRef.current); }, []);

  // FIREBASE
  const listen = (code) => { if(roomRef.current) roomRef.current.off(); const r=db.ref("rooms/"+code); roomRef.current=r; r.on("value",s=>{const d=s.val();if(d)setGame(d);}); };
  const save = (g) => { if(roomRef.current) roomRef.current.set(g); };
  const alog = (g,msg,cls) => { if(!g.log) g.log=[]; g.log.push({msg,cls}); if(g.log.length>50) g.log=g.log.slice(-50); };

  // DICE ENGINES
  const startMulti = (speeds, maxVals) => {
    setDiceStopped(false); setStoppedVals([]); diceRunningRef.current=true; setDiceRunning(true);
    const v=maxVals.map(()=>1); diceValsRef.current=[...v]; setDiceVals([...v]);
    const refs=[]; maxVals.forEach((mx,i)=>{let val=1; refs.push(setInterval(()=>{val=(val%mx)+1;v[i]=val;diceValsRef.current=[...v];setDiceVals([...v]);},speeds[i]));}); diceRefs.current=refs;
  };
  const stopMulti = () => { if(!diceRunningRef.current) return null; diceRunningRef.current=false; diceRefs.current.forEach(r=>clearInterval(r)); diceRefs.current=[]; setDiceRunning(false); const r=[...diceValsRef.current]; setStoppedVals(r); setDiceStopped(true); return r; };
  const startSingle = (speed, mx=6) => {
    setSingleStopped(false); setStoppedSingle(null); singleRunningRef.current=true; setSingleRunning(true);
    let v=1; singleValRef.current=1; setSingleVal(1); singleDiceRef.current=setInterval(()=>{v=(v%mx)+1;singleValRef.current=v;setSingleVal(v);},speed);
  };
  const stopSingle = () => { if(!singleRunningRef.current) return null; singleRunningRef.current=false; clearInterval(singleDiceRef.current); singleDiceRef.current=null; setSingleRunning(false); const v=singleValRef.current; setStoppedSingle(v); setSingleStopped(true); return v; };
  const clearDice = () => { setDiceStopped(false); setStoppedVals([]); setSingleStopped(false); setStoppedSingle(null); };

  // ACTIONS
  const createRoom = () => {
    const code=genCode(); setRoomCode(code); setMySlot("p1");
    localStorage.setItem("encounter-session", JSON.stringify({slot:"p1",code}));
    const g={phase:"waiting",round:0,p1:freshP("P1"),p2:null,firstPlayer:null,log:[{msg:"ENCOUNTER v0.4",cls:"sys"},{msg:"Waiting for P2...",cls:"sys"}]};
    listen(code); save(g); setScreen("game");
  };
  const joinRoom = () => {
    const code=joinInput.toUpperCase().trim(); if(code.length!==4) return;
    setRoomCode(code); setMySlot("p2");
    localStorage.setItem("encounter-session", JSON.stringify({slot:"p2",code}));
    listen(code);
    db.ref("rooms/"+code).once("value",s=>{
      const g=s.val(); if(!g||!g.p1){alert("Room not found");return;} if(g.p2){alert("Room full");return;}
      g.p2=freshP("P2"); g.phase="pick-weapon"; alog(g,"P2 joined!","sys");
      save(g); setScreen("game");
    });
  };
  const destroy = () => { localStorage.removeItem("encounter-session"); if(roomRef.current){roomRef.current.remove();roomRef.current.off();} setScreen("lobby"); setMySlot(null); setGame(null); setRoomCode(""); };

  const pickWeapon = (wId) => {
    const g=JSON.parse(JSON.stringify(game)); const w=WEAPONS.find(x=>x.id===wId);
    g[mySlot].weaponId=wId; g[mySlot].originalWeaponId=wId;
    alog(g,`${mySlot.toUpperCase()} chose ${w.name}`,mySlot);
    if(g.p1.weaponId && g.p2.weaponId) { g.round=1; alog(g,"— Round 1 —","sys"); g.phase="choose"; }
    save(g);
  };

  const pickStyle = (sId) => { const g=JSON.parse(JSON.stringify(game)); g[mySlot].style=sId; save(g); };
  const pickDefense = (dId) => { const g=JSON.parse(JSON.stringify(game)); g[mySlot].defense=dId; save(g); };
  const lockIn = () => {
    const g=JSON.parse(JSON.stringify(game)); g[mySlot].locked=true;
    alog(g,`${g[mySlot].name} locked in`,mySlot);
    if(g.p1.locked && g.p2.locked) { g.phase="initiative"; }
    save(g);
  };

  // INITIATIVE
  const rollInit = () => { startSingle(INIT_SPEED); };
  const stopInit = () => {
    const val=stopSingle(); if(val===null) return;
    const g=JSON.parse(JSON.stringify(game)); g[mySlot].initRoll=val;
    alog(g,`${g[mySlot].name} initiative: ${val}`,mySlot);
    // Check if both rolled
    const other=mySlot==="p1"?"p2":"p1";
    if(g[other].initRoll !== null && g[other].initRoll !== undefined) {
      let first;
      if(g.p1.initRoll > g.p2.initRoll) first="p1";
      else if(g.p2.initRoll > g.p1.initRoll) first="p2";
      else first=Math.random()<0.5?"p1":"p2";
      g.firstPlayer=first;
      alog(g,`${first.toUpperCase()} goes first!`,"win");
      g.phase="combat-atk-"+first;
      // Check reload
      const fp=g[first];
      if(getW(fp.weaponId).reload && fp.shotsFired>=2) {
        fp.atkRolls=[0]; fp.shotsFired=0;
        alog(g,`${fp.name} is RELOADING`,first);
        const second=first==="p1"?"p2":"p1";
        g.phase="combat-atk-"+second;
      }
    }
    save(g);
    setTimeout(clearDice, 2000);
  };

  // ATTACK
  const rollAtk = () => {
    const me=game[mySlot]; const w=getW(me.weaponId);
    startMulti(getAtkSpeeds(w, me.style), w.dice);
  };
  const stopAtk = () => {
    const rolls=stopMulti(); if(!rolls) return;
    const g=JSON.parse(JSON.stringify(game)); const me=g[mySlot]; const w=getW(me.weaponId);
    me.atkRolls=rolls.slice(0,w.dice.length);
    if(w.reload) me.shotsFired=(me.shotsFired||0)+1;
    const total=me.atkRolls.reduce((a,b)=>a+b,0);
    alog(g,`${me.name} attack: ${me.atkRolls.length>1?me.atkRolls.join("+")+`=${total}`:total}`,mySlot);
    // Now other player defends
    const other=mySlot==="p1"?"p2":"p1";
    g.phase="combat-def-"+other;
    save(g);
    setTimeout(clearDice, 2000);
  };

  // DEFENSE
  const rollDef = () => {
    const me=game[mySlot];
    startSingle(getDefSpeed(me.style, me.defense));
  };
  const stopDef = () => {
    const val=stopSingle(); if(val===null) return;
    const g=JSON.parse(JSON.stringify(game)); g[mySlot].defRoll=val;
    alog(g,`${g[mySlot].name} defense: ${val}`,mySlot);
    // Resolve this exchange
    const atkSlot=mySlot==="p1"?"p2":"p1";
    const atk=g[atkSlot]; const def=g[mySlot];
    const atkW=getW(atk.weaponId); const defW=getW(def.weaponId);
    const atkTotal=atk.atkRolls.reduce((a,b)=>a+b,0);
    const defTotal=def.defRoll+(defW.defBonus||0);
    const atkReloading=atk.atkRolls[0]===0&&atk.atkRolls.length===1;
    let dmg=0;

    if(atkReloading) { alog(g,`${atk.name} reloaded — no damage`,atkSlot); }
    else {
      if(def.defense==="dodge") {
        if(atkW.ignoresDodge){dmg=atkTotal;alog(g,`Shotgun ignores DODGE — ${dmg} damage!`,"dmg");}
        else if(defTotal>=atkTotal){alog(g,`${def.name} DODGED! (${defTotal} vs ${atkTotal})`,mySlot);}
        else{dmg=atkTotal;alog(g,`${def.name} failed dodge — ${dmg} damage!`,"dmg");}
      } else if(def.defense==="block") {
        if(atkW.ignoresBlock){dmg=atkTotal;alog(g,`Ignores BLOCK — ${dmg} damage!`,"dmg");}
        else{dmg=Math.max(0,atkTotal-defTotal);alog(g,`${def.name} blocked ${defTotal} — takes ${dmg}`,mySlot);}
      } else if(def.defense==="disarm") {
        const db2=defW.disarmBonus||0;
        if((defTotal+db2)>=atkTotal&&atkW.disarmable){alog(g,`${def.name} DISARMED ${atk.name}'s ${atkW.name}!`,"win");g[atkSlot].weaponId="fists";}
        else{dmg=atkTotal;alog(g,`Disarm failed — ${dmg} damage!`,"dmg");}
      } else if(def.defense==="recover") {
        if(defTotal>=atkTotal){alog(g,`${def.name} RECOVERED their ${getW(def.originalWeaponId).name}!`,"win");g[mySlot].weaponId=def.originalWeaponId;}
        else{dmg=atkTotal;alog(g,`Recovery failed — ${dmg} damage!`,"dmg");}
      }
    }
    if(dmg>0) g[mySlot].hp=Math.max(0,g[mySlot].hp-dmg);

    // Check death or next exchange
    if(g[mySlot].hp<=0) {
      alog(g,`${def.name} is DOWN!`,"win");
      if(g.p1.hp<=0&&g.p2.hp<=0) alog(g,"DOUBLE KO!","win");
      else if(g.p1.hp<=0) alog(g,"P2 WINS!","win");
      else alog(g,"P1 WINS!","win");
      g.phase="done";
    } else if(atkSlot===g.firstPlayer) {
      // First player attacked, now second attacks back
      const second=g.firstPlayer==="p1"?"p2":"p1";
      const sp=g[second]; const sw=getW(sp.weaponId);
      if(sw.reload&&sp.shotsFired>=2){sp.atkRolls=[0];sp.shotsFired=0;alog(g,`${sp.name} is RELOADING`,second);g.phase="resolve";}
      else g.phase="combat-atk-"+second;
    } else {
      g.phase="resolve";
    }
    save(g);
    setTimeout(clearDice, 2000);
  };

  // RESOLVE ROUND
  useEffect(()=>{
    if(!game||game.phase!=="resolve") return;
    // Just show result, P1 advances
    // Already resolved in stopDef
  },[game?.phase]);

  const nextRound = () => {
    const g=JSON.parse(JSON.stringify(game));
    g.round++;
    g.p1.style=null;g.p1.defense=null;g.p1.atkRolls=[];g.p1.defRoll=null;g.p1.initRoll=null;g.p1.locked=false;
    g.p2.style=null;g.p2.defense=null;g.p2.atkRolls=[];g.p2.defRoll=null;g.p2.initRoll=null;g.p2.locked=false;
    g.firstPlayer=null;
    alog(g,`— Round ${g.round} —`,"sys");
    g.phase="choose";
    save(g);
  };

  // ==========================================
  // COMPONENTS
  // ==========================================
  const LC={sys:"#ddd",p1:"#6bb5ff",p2:"#ff8888",win:"#f0c845",dmg:"#ff6666"};
  const Log=()=>(<div ref={logRef} style={S.log}>{(game?.log||[]).slice(-30).map((l,i)=>(<div key={i} style={{color:LC[l.cls]||"#ccc"}}>{l.msg}</div>))}</div>);

  const HPBar=({current,max,color})=>(<div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
    <div style={{fontSize:20,fontWeight:700,color:"#fff",minWidth:60}}>{current}/{max}</div>
    <div style={{flex:1,height:14,background:"#333",borderRadius:3,overflow:"hidden"}}><div style={{width:(current/max*100)+"%",height:"100%",background:current<=3?"#ff4a4a":color,transition:"width 0.3s"}}/></div>
  </div>);

  const PS=({p,slot,hl})=>{
    if(!p||!p.weaponId) return <div style={{flex:1,border:"1px solid #444",padding:12,background:"#111",borderRadius:6,color:"#555"}}>Waiting...</div>;
    const c=slot==="p1"?"#4a9eff":"#ff6b6b"; const w=getW(p.weaponId); const rl=w.reload&&p.shotsFired>=2;
    return(<div style={{flex:1,border:hl?`2px solid ${c}`:"1px solid #444",padding:12,background:"#111",borderRadius:6}}>
      <div style={{fontWeight:700,fontSize:18,color:"#fff",marginBottom:4}}>{p.name}</div>
      <HPBar current={p.hp} max={START_HP} color={c}/>
      <div style={{fontSize:18,color:"#fff",fontWeight:700}}>⚔ {w.name}</div>
      <div style={{fontSize:14,color:"#ddd",marginTop:2}}>{w.type} • {w.dice.map(d=>`d${d}`).join("+")}</div>
      <div style={{fontSize:14,color:"#6eff9a",marginTop:2}}>{w.special}</div>
      {rl&&<div style={{fontSize:14,color:"#f0c845",fontWeight:700,marginTop:4}}>⟳ MUST RELOAD</div>}
    </div>);
  };
  const Players=({hl})=>(<div style={S.players}><PS p={game?.p1} slot="p1" hl={hl==="p1"}/><PS p={game?.p2} slot="p2" hl={hl==="p2"}/></div>);

  const MultiD=({maxVals,vals,running,stopped,sv,label,onStart,onStop})=>(<div style={S.diceArea}>
    <div style={{fontSize:18,color:"#fff",fontWeight:700,marginBottom:10}}>{label}</div>
    <div style={{display:"flex",justifyContent:"center",gap:20}}>{maxVals.map((mx,i)=>(<div key={i} style={{textAlign:"center"}}>
      <div style={{fontSize:14,color:"#ccc",marginBottom:4}}>d{mx}</div>
      <div style={{fontSize:64,fontWeight:800,width:90,height:80,lineHeight:"80px",color:stopped?"#e8b031":running?"#888":"#555",border:stopped?"2px solid #e8b031":"1px solid #444",background:"#0a0a0a",borderRadius:6,fontFamily:"'Courier New',monospace"}}>{stopped?(sv[i]||"—"):running?vals[i]:"—"}</div>
    </div>))}</div>
    {stopped?<div style={{fontSize:24,color:"#e8b031",fontWeight:700,marginTop:14}}>{sv.length>1?sv.join("+")+`=${sv.reduce((a,b)=>a+b,0)}`:sv[0]}</div>
    :!running?<button style={S.tapBtn} onPointerDown={e=>{e.preventDefault();onStart()}}>START</button>
    :<button style={{...S.tapBtn,background:"#ff6b6b"}} onPointerDown={e=>{e.preventDefault();onStop()}}>TAP!</button>}
  </div>);

  const SingleD=({val,running,stopped,sv,label,color,onStart,onStop})=>(<div style={S.diceArea}>
    <div style={{fontSize:18,color:"#fff",fontWeight:700,marginBottom:10}}>{label}</div>
    <div style={{display:"flex",justifyContent:"center"}}><div style={{textAlign:"center"}}>
      <div style={{fontSize:14,color:"#ccc",marginBottom:4}}>d6</div>
      <div style={{fontSize:64,fontWeight:800,width:90,height:80,lineHeight:"80px",color:stopped?(color||"#e8b031"):running?"#888":"#555",border:stopped?`2px solid ${color||"#e8b031"}`:"1px solid #444",background:"#0a0a0a",borderRadius:6,fontFamily:"'Courier New',monospace"}}>{stopped?sv:running?val:"—"}</div>
    </div></div>
    {stopped?<div style={{fontSize:24,color:color||"#e8b031",fontWeight:700,marginTop:14}}>{sv}</div>
    :!running?<button style={S.tapBtn} onPointerDown={e=>{e.preventDefault();onStart()}}>START</button>
    :<button style={{...S.tapBtn,background:color||"#e8b031",color:"#0a0a0a"}} onPointerDown={e=>{e.preventDefault();onStop()}}>TAP!</button>}
  </div>);

  const ChoicePanel=({p,onStyle,onDef,onLock})=>{
    const isFists=p.weaponId==="fists";
    return(<div>
      <div style={{fontSize:18,color:"#e8b031",letterSpacing:2,marginBottom:8}}>ATTACK STYLE</div>
      <div style={{display:"flex",gap:6,marginBottom:14}}>{ATTACK_STYLES.map(s=>{const lines=s.desc.split(", ");return(
        <button key={s.id} onClick={()=>onStyle(s.id)} style={{flex:1,padding:"14px 6px",fontFamily:FONT,fontSize:16,fontWeight:700,cursor:"pointer",border:p.style===s.id?"2px solid #e8b031":"1px solid #444",background:p.style===s.id?"#1a1800":"#151515",color:p.style===s.id?"#e8b031":"#fff",textAlign:"center",borderRadius:6}}>
          <div>{s.name}</div>{lines.map((l,i)=>(<div key={i} style={{fontSize:12,fontWeight:400,color:i===0?"#ccc":"#999",marginTop:i===0?4:2}}>{l}</div>))}
        </button>);})}</div>
      <div style={{fontSize:18,color:"#4aff7a",letterSpacing:2,marginBottom:8}}>DEFENSE</div>
      <div style={{display:"flex",gap:6,marginBottom:14}}>{DEFENSE_TYPES.map(d=>{
        const sr=isFists&&d.id==="disarm"; const label=sr?"RECOVER":d.name; const l1=sr?"On success, get weapon back":d.line1; const l2=sr?"On fail, full damage":d.line2; const dId=sr?"recover":d.id;
        return(<button key={d.id} onClick={()=>onDef(dId)} style={{flex:1,padding:"14px 6px",fontFamily:FONT,fontSize:16,fontWeight:700,cursor:"pointer",border:p.defense===dId?"2px solid #4aff7a":"1px solid #444",background:p.defense===dId?"#0a1a0a":"#151515",color:p.defense===dId?"#4aff7a":"#fff",textAlign:"center",borderRadius:6}}>
          <div>{label}</div><div style={{fontSize:12,fontWeight:400,color:"#ccc",marginTop:4}}>{l1}</div><div style={{fontSize:12,fontWeight:400,color:"#999",marginTop:2}}>{l2}</div>
        </button>);})}</div>
      {p.style&&p.defense&&!p.locked&&<button style={S.bigBtn} onClick={onLock}>LOCK IN</button>}
      {p.locked&&<div style={{textAlign:"center",color:"#f0c845",fontSize:18,fontWeight:700,padding:12}}>LOCKED IN ✓</div>}
    </div>);
  };

  // ==========================================
  // SCREENS
  // ==========================================
  if(screen==="lobby") return(
    <div style={S.container}><h1 style={S.title}>ENCOUNTER</h1><div style={S.ver}>v0.4 // ONLINE</div>
    <div style={{padding:"20px 0"}}>
      <button style={S.bigBtn} onClick={createRoom}>CREATE FIGHT</button>
      <div style={{color:"#999",textAlign:"center",margin:"20px 0 10px",fontSize:14}}>— or join —</div>
      <input style={{width:"100%",padding:14,textAlign:"center",background:"#111",border:"1px solid #444",color:"#f0c845",fontFamily:FONT,fontSize:24,letterSpacing:8,borderRadius:6,marginBottom:8}} placeholder="CODE" maxLength="4" value={joinInput} onChange={e=>setJoinInput(e.target.value)}/>
      <button style={S.bigBtn} onClick={joinRoom}>JOIN FIGHT</button>
    </div></div>
  );

  if(!game) return <div style={S.container}><div style={{color:"#999",textAlign:"center",padding:40}}>Loading...</div></div>;
  if(!mySlot) return <div style={S.container}><div style={{color:"#999",textAlign:"center",padding:40}}>Reconnecting...</div></div>;
  const me=game[mySlot] || {}; const other=mySlot==="p1"?"p2":"p1"; const them=game[other] || {};

  if(game.phase==="waiting") return(
    <div style={S.container}><h1 style={S.title}>ENCOUNTER</h1><div style={S.ver}>v0.4</div>
    <div style={{textAlign:"center",padding:"40px 0"}}><div style={{color:"#ccc",fontSize:16,marginBottom:12}}>Send this code:</div>
    <div style={{color:"#f0c845",fontSize:48,fontWeight:700,letterSpacing:8,marginBottom:20}}>{roomCode}</div>
    <div style={{color:"#ccc",fontSize:14}}>Waiting for P2...</div></div>
    <button style={{...S.bigBtn,background:"none",border:"1px solid #444",color:"#999"}} onClick={destroy}>CANCEL</button></div>
  );

  if(game.phase==="pick-weapon") {
    const myPicked = me && me.weaponId ? true : false;
    return(<div style={S.container}><h1 style={S.title}>ENCOUNTER</h1><div style={S.ver}>{roomCode}</div>
    <Players/>
    <div style={S.phase}>{myPicked?"Waiting for opponent...":"CHOOSE YOUR WEAPON"}</div>
    {!myPicked&&<div style={{display:"flex",flexDirection:"column",gap:8,marginTop:12}}>{WEAPONS.map(w=>(
      <button key={w.id} onClick={()=>pickWeapon(w.id)} style={{padding:16,background:"#111",border:"1px solid #444",fontFamily:FONT,cursor:"pointer",textAlign:"left",borderRadius:6,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div><div style={{fontSize:20,fontWeight:700,color:"#fff"}}>{w.name}</div><div style={{fontSize:14,color:"#ddd",marginTop:4}}>{w.type} • {w.dice.map(d=>`d${d}`).join("+")}</div></div>
        <div style={{fontSize:14,color:"#6eff9a",textAlign:"right",maxWidth:"45%"}}>{w.special}</div>
      </button>))}</div>}
    <Log/></div>);
  }

  if(game.phase==="choose") {
    return(<div style={S.container}><h1 style={S.title}>ENCOUNTER</h1><div style={S.ver}>Round {game.round} • {roomCode}</div>
    <Players/>
    <div style={S.phase}>CHOOSE YOUR STANCE</div>
    <ChoicePanel p={me} onStyle={pickStyle} onDef={pickDefense} onLock={lockIn}/>
    <Log/></div>);
  }

  if(game.phase==="initiative") {
    const iRolled = me.initRoll !== null && me.initRoll !== undefined;
    const theyRolled = them && them.initRoll !== null && them.initRoll !== undefined;
    return(<div style={S.container}><h1 style={S.title}>ENCOUNTER</h1><div style={S.ver}>Round {game.round}</div>
    <Players/>
    <div style={S.phase}>INITIATIVE</div>
    {iRolled?<div style={{textAlign:"center",color:"#f0c845",fontSize:20,fontWeight:700,padding:12}}>You rolled: {me.initRoll} {theyRolled?"":"— waiting for opponent..."}</div>
    :<SingleD val={singleVal} running={singleRunning} stopped={singleStopped} sv={stoppedSingle} label="Roll for initiative!" color={mySlot==="p1"?"#4a9eff":"#ff6b6b"} onStart={rollInit} onStop={stopInit}/>}
    <Log/></div>);
  }

  // COMBAT PHASES
  if(game.phase?.startsWith("combat-atk-")) {
    const who=game.phase.split("-")[2];
    const isMe=who===mySlot;
    const p=game[who]; const w=getW(p.weaponId);
    return(<div style={S.container}><h1 style={S.title}>ENCOUNTER</h1><div style={S.ver}>Round {game.round}</div>
    <Players hl={who}/>
    {isMe?<MultiD maxVals={w.dice} vals={diceVals} running={diceRunning} stopped={diceStopped} sv={stoppedVals} label={`${p.name}: ATTACK!`} onStart={rollAtk} onStop={stopAtk}/>
    :<div style={{...S.diceArea,padding:30}}><div style={{fontSize:20,color:"#ccc"}}>{p.name} is attacking...</div></div>}
    <Log/></div>);
  }

  if(game.phase?.startsWith("combat-def-")) {
    const who=game.phase.split("-")[2];
    const isMe=who===mySlot;
    const p=game[who]; const defLabel=p.defense==="recover"?"RECOVER":p.defense?.toUpperCase();
    return(<div style={S.container}><h1 style={S.title}>ENCOUNTER</h1><div style={S.ver}>Round {game.round}</div>
    <Players hl={who}/>
    {isMe?<SingleD val={singleVal} running={singleRunning} stopped={singleStopped} sv={stoppedSingle} label={`${p.name}: DEFEND (${defLabel})`} color="#4aff7a" onStart={rollDef} onStop={stopDef}/>
    :<div style={{...S.diceArea,padding:30}}><div style={{fontSize:20,color:"#ccc"}}>{p.name} is defending...</div></div>}
    <Log/></div>);
  }

  if(game.phase==="resolve") {
    return(<div style={S.container}><h1 style={S.title}>ENCOUNTER</h1><div style={S.ver}>Round {game.round}</div>
    <Players/>
    <div style={{textAlign:"center",padding:"24px 0",cursor:"pointer"}} onClick={mySlot==="p1"?nextRound:null}>
      <div style={{fontSize:22,color:"#f0c845",fontWeight:700,marginBottom:12}}>ROUND {game.round} COMPLETE</div>
      <div style={{fontSize:18,color:"#fff",marginBottom:4}}>P1: {game.p1.hp}/{START_HP} HP</div>
      <div style={{fontSize:18,color:"#fff",marginBottom:14}}>P2: {game.p2.hp}/{START_HP} HP</div>
      <div style={{fontSize:16,color:"#ccc"}}>{mySlot==="p1"?"tap to continue":"P1 advances..."}</div>
    </div><Log/></div>);
  }

  if(game.phase==="done") {
    let wt="DOUBLE KO!"; if(game.p1.hp>0) wt="P1 WINS!"; if(game.p2.hp>0) wt="P2 WINS!";
    return(<div style={S.container}><h1 style={S.title}>ENCOUNTER</h1><div style={S.ver}>FIGHT OVER</div>
    <div style={{textAlign:"center",padding:"30px 0"}}><div style={{fontSize:32,color:"#f0c845",fontWeight:700,marginBottom:16}}>{wt}</div>
    <div style={{color:"#ddd",fontSize:16,marginBottom:20}}>Rounds: {game.round}</div>
    <button style={S.bigBtn} onClick={destroy}>NEW FIGHT</button></div>
    <Players/><Log/></div>);
  }

  return(<div style={S.container}><div style={S.phase}>...</div><Log/></div>);
}

const SFONT="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif";
const S={
  container:{background:"#0a0a0a",color:"#ddd",fontFamily:SFONT,fontSize:15,minHeight:"100vh",padding:12,maxWidth:500,margin:"0 auto"},
  title:{fontSize:28,color:"#e8b031",letterSpacing:4,textAlign:"center",margin:0,fontFamily:"'Courier New',monospace"},
  ver:{color:"#999",fontSize:14,textAlign:"center",marginBottom:14},
  phase:{textAlign:"center",color:"#f0c845",fontSize:22,fontWeight:700,letterSpacing:2,marginBottom:8},
  players:{display:"flex",gap:8,marginBottom:12},
  diceArea:{border:"1px solid #444",background:"#111",padding:24,marginBottom:12,textAlign:"center",borderRadius:6},
  tapBtn:{background:"#e8b031",color:"#0a0a0a",border:"none",padding:"18px 60px",fontFamily:SFONT,fontSize:22,fontWeight:700,cursor:"pointer",marginTop:14,letterSpacing:2,touchAction:"manipulation",borderRadius:6},
  bigBtn:{display:"block",width:"100%",padding:18,background:"#e8b031",color:"#0a0a0a",border:"none",fontFamily:SFONT,fontSize:20,fontWeight:700,cursor:"pointer",letterSpacing:2,marginBottom:10,borderRadius:6},
  log:{background:"#181818",border:"1px solid #444",padding:14,fontSize:15,lineHeight:1.9,maxHeight:200,overflowY:"auto",fontFamily:SFONT,borderRadius:6},
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
